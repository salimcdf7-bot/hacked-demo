<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hacked</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
  }
  @keyframes glitch {
    0%, 100% { text-shadow: 3px 0 #ff4d6d, -3px 0 #00d4ff; }
    25% { text-shadow: -3px 0 #ff4d6d, 3px 0 #00d4ff; }
    50% { text-shadow: 3px 3px #ff4d6d, -3px -3px #00d4ff; }
    75% { text-shadow: -3px 3px #ff4d6d, 3px -3px #00d4ff; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .box {
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.6s ease;
  }
  .skull { font-size: 80px; margin-bottom: 1rem; animation: blink 1.5s infinite; }
  .hacked {
    font-size: clamp(52px, 18vw, 90px);
    font-weight: 900;
    color: #ff4d6d;
    letter-spacing: 6px;
    animation: glitch 0.8s infinite;
    margin-bottom: 1rem;
  }
  .sub {
    color: #8892a4;
    font-size: 15px;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }
  .tip {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 12px;
    padding: 14px 20px;
    color: #fca5a5;
    font-size: 13px;
    max-width: 300px;
    line-height: 1.7;
  }
  .tip strong { color: #ff4d6d; }
</style>
</head>
<body>
<div class="box">
  <div class="skull">💀</div>
  <div class="hacked">HACKED</div>
  <div class="sub">You just scanned an unknown QR code!</div>
  <div class="tip">
    <strong>⚠ Security Awareness Demo</strong><br>
    Never scan QR codes from unknown or untrusted sources. Attackers use QR codes to redirect victims to malicious sites.
  </div>
</div>
</body>
</html>
